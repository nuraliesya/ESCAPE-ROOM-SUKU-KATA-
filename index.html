<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kembara Muzium Ajaib</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Andika&family=Bubblegum+Sans&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Andika', sans-serif;
            background-color: #1a1a1a;
            margin: 0;
            overflow: hidden;
            touch-action: manipulation;
        }

        .game-wrapper {
            display: grid;
            grid-template-rows: 20% 80%;
            width: 100vw;
            height: 100vh;
            background: #27272a;
        }

        /* UI Atas */
        .header-section {
            background: #18181b;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-bottom: 4px solid #ca8a04;
            z-index: 100;
        }

        .word-bubble {
            background: white;
            padding: 10px 60px;
            border-radius: 15px;
            font-size: 48px;
            color: #18181b;
            border: 5px solid #ca8a04;
            box-shadow: 0 8px 0 #854d0e;
            text-align: center;
            min-width: 280px;
        }

        /* Pentas */
        .stage {
            position: relative;
            overflow: hidden;
            background: #3f3f46;
            height: 100%;
        }

        .moving-background {
            position: absolute;
            top: 0;
            left: 0;
            width: 200%;
            height: 75%;
            background: radial-gradient(circle at 50% 50%, #52525b 0%, #3f3f46 100%);
            display: flex;
            align-items: center;
            transition: transform 1.5s cubic-bezier(0.45, 0.05, 0.55, 0.95);
        }

        .bg-idle-move {
            animation: idle-scroll 30s linear infinite alternate;
        }
        @keyframes idle-scroll {
            from { transform: translateX(0); }
            to { transform: translateX(-15%); }
        }

        .museum-set {
            width: 50%;
            display: flex;
            justify-content: space-around;
            align-items: center;
            position: relative;
        }

        .painting {
            width: 150px;
            height: 190px;
            background: #fff;
            border: 10px solid #422006;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 80px;
            border-radius: 4px;
        }

        .floor {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 25%;
            background: #262626;
            border-top: 10px solid #18181b;
            z-index: 10;
        }

        /* Watak Animasi */
        #girl-container {
            position: absolute;
            bottom: 45px;
            left: 15%;
            width: 110px;
            height: 190px;
            z-index: 50;
            transition: left 1.5s ease-in-out, transform 0.5s, opacity 0.6s;
        }

        .walking .leg { animation: leg-swing 0.4s infinite alternate ease-in-out; }
        .walking .leg-r { animation-delay: 0.4s; }
        .walking .arm { animation: arm-swing 0.4s infinite alternate ease-in-out; }
        .walking .arm-r { animation-delay: 0.4s; }

        @keyframes leg-swing {
            from { transform: rotate(-18deg); transform-origin: top center; }
            to { transform: rotate(28deg); transform-origin: top center; }
        }
        @keyframes arm-swing {
            from { transform: rotate(-15deg); transform-origin: top center; }
            to { transform: rotate(25deg); transform-origin: top center; }
        }

        .bump {
            animation: bump-anim 0.6s ease-out;
        }
        @keyframes bump-anim {
            0% { transform: translateX(0); }
            35% { transform: translateX(350px); }
            50% { transform: translateX(345px) scaleX(0.85) rotate(4deg); }
            75% { transform: translateX(300px) rotate(-8deg); }
            100% { transform: translateX(0); }
        }

        /* Pintu */
        .exit-door {
            position: absolute;
            right: 15%;
            bottom: 25%;
            width: 150px;
            height: 250px;
            background: #18181b;
            border-radius: 10px 10px 0 0;
            z-index: 20;
        }

        .door-panel {
            position: absolute;
            width: 100%;
            height: 100%;
            background: #573e2e;
            border: 5px solid #3d2b1f;
            border-radius: 8px 8px 0 0;
            transform-origin: left;
            transition: transform 1s ease-in-out;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-right: 18px;
        }

        .door-panel::after {
            content: '';
            width: 18px;
            height: 18px;
            background: #ca8a04;
            border-radius: 50%;
        }

        .door-open .door-panel {
            transform: perspective(1200px) rotateY(-115deg);
        }

        /* Kawalan */
        .controls {
            position: fixed;
            bottom: 35px;
            right: 35px;
            z-index: 200;
            text-align: center;
        }

        .mic-button {
            width: 85px;
            height: 85px;
            background: #dc2626;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: 6px solid white;
            box-shadow: 0 6px 20px rgba(0,0,0,0.5);
        }

        .mic-listening {
            background: #16a34a;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(22, 163, 74, 0.7); }
            70% { transform: scale(1.1); box-shadow: 0 0 0 20px rgba(22, 163, 74, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(22, 163, 74, 0); }
        }

        .feedback-pop {
            position: fixed;
            left: 50%;
            top: 40%;
            transform: translate(-50%, -50%);
            font-size: 35px;
            color: white;
            padding: 15px 50px;
            border-radius: 50px;
            z-index: 300;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        /* Skrin Kemenangan */
        .escape-background {
            position: fixed;
            inset: 0;
            background: linear-gradient(to bottom, #7dd3fc 60%, #22c55e 60%);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }

        .sun {
            position: absolute;
            top: 60px;
            right: 12%;
            width: 110px;
            height: 110px;
            background: #facc15;
            border-radius: 50%;
            box-shadow: 0 0 70px #fbbf24;
        }
    </style>
</head>
<body>

<!-- Overlay Mula (Kekalkan Yang Asal) -->
<div id="start-overlay" class="fixed inset-0 z-[1000] flex flex-col items-center justify-center">
    <div class="absolute inset-0 stage overflow-hidden">
        <div class="moving-background bg-idle-move">
            <div class="museum-set"></div>
            <div class="museum-set"></div>
        </div>
        <div class="floor"></div>
        <div class="exit-door"><div class="door-panel"></div></div>
        
        <div class="absolute bottom-[45px] left-[15%] w-[110px] h-[190px] walking">
            <svg viewBox="0 0 100 180" class="w-full h-full">
                <rect x="25" y="45" width="50" height="20" rx="10" fill="#3a2323" />
                <g class="leg leg-l"><rect x="38" y="130" width="10" height="40" rx="5" fill="#f3d5b5" /></g>
                <g class="leg leg-r"><rect x="52" y="130" width="10" height="40" rx="5" fill="#f3d5b5" /></g>
                <path d="M30 80 L70 80 L85 135 L15 135 Z" fill="#e11d48" />
                <g class="arm arm-l"><rect x="22" y="80" width="10" height="35" rx="5" fill="#f3d5b5" /></g>
                <g class="arm arm-r"><rect x="68" y="80" width="10" height="35" rx="5" fill="#f3d5b5" /></g>
                <circle cx="50" cy="45" r="28" fill="#f3d5b5" />
                <path d="M22 45 Q22 15 50 15 Q78 15 78 45 L78 50 Q50 40 22 50 Z" fill="#3a2323" />
                <circle cx="40" cy="45" r="2.5" fill="#000" />
                <circle cx="60" cy="45" r="2.5" fill="#000" />
            </svg>
        </div>
    </div>
    
    <div class="relative z-[1100] text-center bg-black/60 backdrop-blur-md p-14 rounded-[40px] border-8 border-yellow-600/40 mx-4">
        <h1 class="text-8xl font-bold mb-6 text-yellow-500" style="font-family: 'Bubblegum Sans'">MUZIUM KATA</h1>
        <p class="text-4xl mb-12 text-white font-bold">Sebut ayat dengan betul untuk keluar!</p>
        <button onclick="initGame()" class="bg-yellow-600 hover:bg-yellow-500 text-white font-bold text-5xl px-20 py-8 rounded-3xl shadow-[0_15px_0_#854d0e] transition-all active:translate-y-2 active:shadow-none">
            MULA KEMBARA
        </button>
    </div>
</div>

<!-- Antaramuka Utama -->
<div class="game-wrapper">
    <div class="header-section">
        <div class="word-bubble" id="target-phrase">---</div>
    </div>

    <div class="stage" id="main-stage">
        <div class="moving-background" id="bg-wall">
            <div class="museum-set">
                <div class="painting" id="art-1">🖼️</div>
                <div class="painting" id="art-2">🖼️</div>
            </div>
            <div class="museum-set">
                <div class="painting" id="art-3">🖼️</div>
                <div class="painting" id="art-4">🖼️</div>
            </div>
        </div>

        <div class="exit-door" id="door-wrap">
            <div class="door-panel"></div>
        </div>

        <div id="girl-container" class="walking">
            <svg viewBox="0 0 100 180" class="w-full h-full">
                <rect x="25" y="45" width="50" height="20" rx="10" fill="#3a2323" />
                <g class="leg leg-l"><rect x="38" y="130" width="10" height="40" rx="5" fill="#f3d5b5" /></g>
                <g class="leg leg-r"><rect x="52" y="130" width="10" height="40" rx="5" fill="#f3d5b5" /></g>
                <path d="M30 80 L70 80 L85 135 L15 135 Z" fill="#e11d48" />
                <g class="arm arm-l"><rect x="22" y="80" width="10" height="35" rx="5" fill="#f3d5b5" /></g>
                <g class="arm arm-r"><rect x="68" y="80" width="10" height="35" rx="5" fill="#f3d5b5" /></g>
                <circle cx="50" cy="45" r="28" fill="#f3d5b5" />
                <path d="M22 45 Q22 15 50 15 Q78 15 78 45 L78 50 Q50 40 22 50 Z" fill="#3a2323" />
                <circle cx="40" cy="45" r="2.5" fill="#000" />
                <circle cx="60" cy="45" r="2.5" fill="#000" />
            </svg>
        </div>

        <div class="floor"></div>
    </div>
</div>

<div class="controls">
    <button id="mic-btn" class="mic-button" onclick="toggleListening()">
        <svg viewBox="0 0 24 24" width="45" height="45" fill="white">
            <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/>
            <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
        </svg>
    </button>
</div>

<div id="feedback" class="feedback-pop shadow-2xl font-bold"></div>

<div id="win-overlay" class="escape-background">
    <div class="sun"></div>
    <div class="relative z-10 flex flex-col items-center">
        <h1 class="text-9xl font-bold text-yellow-900 mb-4" style="font-family: 'Bubblegum Sans'">BEBAS! 🎉</h1>
        <p class="text-4xl text-green-900 mb-12 font-extrabold text-center">Hebat! Anda berjaya keluar!</p>
        <button onclick="location.reload()" class="bg-white text-green-700 font-bold text-4xl px-16 py-7 rounded-3xl shadow-2xl">Main Lagi</button>
    </div>
</div>

<script>
    // Senarai 10 ayat yang diminta
    const phrases = [
        "buku baru", "meja kayu", "paku besi", "raga baju", "lada merah",
        "bola baru", "baju biru", "batu bata", "pasu lama", "kaca besar"
    ];
    
    const paintings = ["🍎", "🐘", "🚗", "🧸", "🏠", "⚽", "👕", "🧱", "🏺", "🔍"];

    let currentLevel = 0;
    let isListening = false;
    let recognition;
    let audioCtx;
    let bgMusicInterval;

    // Sistem Muzik Latar Belakang Sintetik
    function startMusic() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        function playNote(freq, start, duration) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(freq, start);
            gain.gain.setValueAtTime(0.04, start);
            gain.gain.exponentialRampToValueAtTime(0.001, start + duration);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start(start);
            osc.stop(start + duration);
        }

        function playSequence() {
            const now = audioCtx.currentTime;
            playNote(261.63, now, 1.5);      // C4
            playNote(329.63, now + 0.5, 1.5); // E4
            playNote(392.00, now + 1.0, 1.5); // G4
            playNote(523.25, now + 1.5, 1.5); // C5
        }

        playSequence();
        bgMusicInterval = setInterval(playSequence, 4000);
    }

    function playSoundEffect(type) {
        if (!audioCtx) return;
        const now = audioCtx.currentTime;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        
        if (type === 'success') {
            osc.frequency.setValueAtTime(523.25, now);
            osc.frequency.exponentialRampToValueAtTime(1046.50, now + 0.3);
            gain.gain.setValueAtTime(0.1, now);
        } else {
            osc.frequency.setValueAtTime(130.81, now);
            osc.frequency.linearRampToValueAtTime(65.41, now + 0.4);
            gain.gain.setValueAtTime(0.1, now);
        }
        
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(now + 0.4);
    }

    if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
        const SpeechReg = window.SpeechRecognition || window.webkitSpeechRecognition;
        recognition = new SpeechReg();
        recognition.lang = 'ms-MY';
        recognition.onresult = (e) => processResult(e.results[0][0].transcript.toLowerCase());
        recognition.onend = () => {
            isListening = false;
            document.getElementById('mic-btn').classList.remove('mic-listening');
        };
    }

    function initGame() {
        document.getElementById('start-overlay').style.display = 'none';
        startMusic();
        loadLevel();
    }

    function loadLevel() {
        const bgWall = document.getElementById('bg-wall');
        const door = document.getElementById('door-wrap');
        const phraseBox = document.getElementById('target-phrase');
        const girl = document.getElementById('girl-container');
        
        bgWall.style.transition = "none";
        bgWall.style.transform = "translateX(0)";
        door.classList.remove('door-open');
        phraseBox.innerText = phrases[currentLevel];
        
        girl.style.transition = "none";
        girl.style.left = "-15%";
        girl.style.opacity = "1";
        
        setTimeout(() => {
            bgWall.style.transition = "transform 1.5s cubic-bezier(0.45, 0.05, 0.55, 0.95)";
            girl.style.transition = "left 1.5s ease-in-out, transform 0.5s, opacity 0.6s";
            girl.style.left = "15%";
        }, 80);

        document.getElementById('art-1').innerText = paintings[currentLevel % paintings.length];
        document.getElementById('art-2').innerText = paintings[(currentLevel + 1) % paintings.length];
        document.getElementById('art-3').innerText = paintings[(currentLevel + 2) % paintings.length];
        document.getElementById('art-4').innerText = paintings[(currentLevel + 3) % paintings.length];
    }

    function toggleListening() {
        if (!recognition || isListening) return;
        recognition.start();
        isListening = true;
        document.getElementById('mic-btn').classList.add('mic-listening');
    }

    function processResult(said) {
        const target = phrases[currentLevel].toLowerCase();
        if (said.includes(target) || said.replace(/\s/g, '').includes(target.replace(/\s/g, ''))) {
            handleSuccess();
        } else {
            handleFailure();
        }
    }

    function handleSuccess() {
        playSoundEffect('success');
        showFeedback("Betul! ✨", "bg-green-600");
        const door = document.getElementById('door-wrap');
        const girl = document.getElementById('girl-container');
        const bgWall = document.getElementById('bg-wall');

        door.classList.add('door-open');

        setTimeout(() => {
            girl.style.left = "80%"; 
            
            setTimeout(() => {
                bgWall.style.transform = "translateX(-50%)";
                girl.style.opacity = "0"; 
                
                setTimeout(() => {
                    currentLevel++;
                    if (currentLevel < phrases.length) {
                        loadLevel();
                    } else {
                        document.getElementById('win-overlay').style.display = 'flex';
                    }
                }, 1100);
            }, 1200);
        }, 600);
    }

    function handleFailure() {
        playSoundEffect('fail');
        showFeedback("Cuba lagi! 🔄", "bg-red-600");
        const girl = document.getElementById('girl-container');
        girl.style.left = "75%";
        setTimeout(() => {
            girl.classList.add('bump');
            setTimeout(() => {
                girl.classList.remove('bump');
                girl.style.left = "15%";
            }, 600);
        }, 200);
    }

    function showFeedback(text, colorClass) {
        const fb = document.getElementById('feedback');
        fb.innerText = text;
        fb.className = `feedback-pop ${colorClass} opacity-100 shadow-2xl`;
        setTimeout(() => fb.style.opacity = "0", 1800);
    }
</script>

</body>
</html>
